components:
  schemas:
    ApproveAction:
      type: string
      enum:
      - approve
      - reject
      - revise
      title: ApproveAction
    CreatePipelineRequest:
      properties:
        title:
          type: string
          maxLength: 200
          title: Title
          default: ''
        project_path:
          type: string
          maxLength: 1000
          title: Project Path
          default: ''
        requirement:
          type: string
          minLength: 1
          title: Requirement
      type: object
      required:
      - requirement
      title: CreatePipelineRequest
    FrontendActivityItem:
      properties:
        time:
          type: string
          title: Time
        text:
          type: string
          title: Text
        type:
          type: string
          title: Type
      type: object
      required:
      - time
      - text
      - type
      title: FrontendActivityItem
    FrontendAgent:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        role:
          type: string
          title: Role
        description:
          type: string
          title: Description
        model:
          type: string
          title: Model
        provider:
          type: string
          title: Provider
        status:
          type: string
          title: Status
        tasksCompleted:
          type: integer
          title: Taskscompleted
        avgDuration:
          type: integer
          title: Avgduration
        avgTokens:
          type: integer
          title: Avgtokens
        color:
          type: string
          title: Color
      type: object
      required:
      - id
      - name
      - role
      - description
      - model
      - provider
      - status
      - tasksCompleted
      - avgDuration
      - avgTokens
      - color
      title: FrontendAgent
    FrontendAgentSuccessDatum:
      properties:
        name:
          type: string
          title: Name
        rate:
          type: number
          title: Rate
      type: object
      required:
      - name
      - rate
      title: FrontendAgentSuccessDatum
    FrontendAnalyticsOverview:
      properties:
        summary:
          $ref: '#/components/schemas/FrontendAnalyticsSummary'
        pipelineRuns:
          items:
            $ref: '#/components/schemas/FrontendPipelineRunDatum'
          type: array
          title: Pipelineruns
        tokenUsage:
          items:
            $ref: '#/components/schemas/FrontendTokenUsageDatum'
          type: array
          title: Tokenusage
        stageDurations:
          items:
            $ref: '#/components/schemas/FrontendStageDurationDatum'
          type: array
          title: Stagedurations
        agentSuccessRates:
          items:
            $ref: '#/components/schemas/FrontendAgentSuccessDatum'
          type: array
          title: Agentsuccessrates
      type: object
      required:
      - summary
      - pipelineRuns
      - tokenUsage
      - stageDurations
      - agentSuccessRates
      title: FrontendAnalyticsOverview
    FrontendAnalyticsSummary:
      properties:
        totalRuns:
          type: integer
          title: Totalruns
        totalSuccess:
          type: integer
          title: Totalsuccess
        totalTokens:
          type: integer
          title: Totaltokens
        averageDurationMinutes:
          type: number
          title: Averagedurationminutes
        mergedChanges:
          type: integer
          title: Mergedchanges
      type: object
      required:
      - totalRuns
      - totalSuccess
      - totalTokens
      - averageDurationMinutes
      - mergedChanges
      title: FrontendAnalyticsSummary
    FrontendCheckpoint:
      properties:
        id:
          type: string
          title: Id
        pipelineId:
          type: string
          title: Pipelineid
        pipelineName:
          type: string
          title: Pipelinename
        stage:
          type: string
          title: Stage
        stageIndex:
          type: integer
          title: Stageindex
        status:
          type: string
          title: Status
        createdAt:
          type: string
          title: Createdat
        output:
          type: string
          title: Output
        rejectReason:
